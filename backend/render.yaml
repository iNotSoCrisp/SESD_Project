services:
  - type: web
    name: shadowtrade-backend
    runtime: node
    rootDir: backend
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run prisma:generate && npm run build
    startCommand: chmod +x start.sh && ./start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
